services:
  api:
    build: ./server
    ports: ["8000:8000"]
    volumes:
      - ./server/app:/app/app
      - ./utils:/app/utils
      - ./dataset:/app/dataset
    environment:
      - PYTHONUNBUFFERED=1

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    ports: ["5173:5173"]
    environment:
      - VITE_API_URL=http://localhost:8000
    depends_on: [api]